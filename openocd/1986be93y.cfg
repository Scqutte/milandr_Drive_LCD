# Milandr 1986BE93U / MDR32F9Qx, Cortex-M3.

source [find target/swj-dp.tcl]

swj_newdap mdr cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id 0x2ba01477
dap create mdr.dap -chain-position mdr.cpu
target create mdr.cpu cortex_m -endian little -dap mdr.dap

mdr.cpu configure -work-area-phys 0x20000000 -work-area-size 0x8000 -work-area-backup 0

flash bank mdr.flash mdr 0x08000000 0x20000 0 0 mdr.cpu 0 32 4

adapter speed 1000
cortex_m reset_config sysresetreq
